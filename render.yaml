services:
  - type: web
    name: lung-cancer-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 1 --threads 1
    envVars:
      - key: PORT
        value: 10000
      - key: WEB_CONCURRENCY
        value: 1
      - key: MALLOC_ARENA_MAX
        value: 2
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
