services:
  - type: web
    name: lung-cancer-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: TF_ENABLE_ONEDNN_OPTS
        value: 0
